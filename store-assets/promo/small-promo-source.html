<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Retrofy Page Small Promo Tile</title>
  <style>
    * { box-sizing: border-box; }
    html, body {
      width: 440px;
      height: 280px;
      margin: 0;
      overflow: hidden;
      background: #c0c0c0;
      color: #000;
      font-family: Arial, Helvetica, sans-serif;
    }

    body {
      padding: 14px;
      background:
        repeating-linear-gradient(45deg, rgba(255,255,255,.28) 0 8px, rgba(0,0,0,.06) 8px 16px),
        #c0c0c0;
    }

    .tile {
      width: 412px;
      height: 252px;
      border: 4px outset #f2f2f2;
      background: #e7e7e7;
      padding: 13px;
      position: relative;
    }

    .topbar {
      height: 28px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 0 8px;
      background: #000080;
      color: #fff;
      border: 2px inset #d8d8d8;
      font-size: 12px;
      font-weight: 700;
    }

    .buttons span {
      display: inline-flex;
      width: 16px;
      height: 16px;
      align-items: center;
      justify-content: center;
      margin-left: 3px;
      border: 2px outset #fff;
      background: #c0c0c0;
      color: #000;
      font-size: 10px;
      line-height: 1;
    }

    .content {
      display: grid;
      grid-template-columns: 1fr 122px;
      gap: 13px;
      padding-top: 13px;
    }

    h1 {
      margin: 0 0 8px;
      font: 700 39px/0.95 "Times New Roman", Times, serif;
      color: #800080;
      text-shadow: 1px 1px #fff;
    }

    .tagline {
      margin: 0 0 12px;
      font: 700 18px/1.15 Arial, Helvetica, sans-serif;
      color: #000080;
    }

    .linkline {
      font: 15px "Times New Roman", Times, serif;
      color: #00e;
      text-decoration: underline;
      margin-bottom: 11px;
    }

    .badge {
      display: inline-block;
      padding: 5px 8px;
      border: 3px outset #fff;
      background: #ff0;
      font-size: 12px;
      font-weight: 700;
    }

    .preview {
      border: 3px inset #fff;
      background: #fff;
      height: 156px;
      padding: 8px;
      font-family: "Times New Roman", Times, serif;
      overflow: hidden;
    }

    .preview-title {
      margin: 0 0 6px;
      color: #800080;
      font-size: 20px;
      font-weight: 700;
      text-align: center;
    }

    .marquee {
      background: #000080;
      color: #ff0;
      border: 2px outset #fff;
      padding: 3px;
      font: 700 10px Arial, Helvetica, sans-serif;
      white-space: nowrap;
      margin-bottom: 8px;
    }

    .fake-text {
      height: 7px;
      margin: 5px 0;
      background: #777;
    }

    .fake-text.short { width: 66%; }
    .fake-text.link { width: 78%; background: #00e; }

    .counter {
      display: inline-block;
      margin-top: 7px;
      padding: 3px 5px;
      background: #000;
      color: #39ff14;
      border: 2px inset #777;
      font: 700 13px "Courier New", monospace;
    }
  </style>
</head>
<body>
  <main class="tile">
    <div class="topbar">
      <span>Retrofy Page</span>
      <span class="buttons"><span>_</span><span>[]</span><span>X</span></span>
    </div>
    <section class="content">
      <div>
        <h1>Retrofy<br>Page</h1>
        <p class="tagline">Make any webpage beautifully obsolete.</p>
        <div class="linkline">Soft 90s · GeoCities Chaos · Pure HTML</div>
        <span class="badge">Best viewed in 800x600</span>
      </div>
      <div class="preview">
        <div class="marquee">WELCOME TO MY PAGE</div>
        <div class="preview-title">Article</div>
        <div class="fake-text link"></div>
        <div class="fake-text"></div>
        <div class="fake-text short"></div>
        <div class="fake-text"></div>
        <span class="counter">042069</span>
      </div>
    </section>
  </main>
</body>
</html>
