<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Retrofy Page Small Promo Tile</title>
  <style>
    * { box-sizing: border-box; }
    html, body { width: 440px; height: 280px; margin: 0; overflow: hidden; }
    body { padding: 14px; background: #bfbfbf; color: #111; font-family: Arial, Helvetica, sans-serif; }
    .tile { width: 412px; height: 252px; display: grid; grid-template-columns: 178px 1fr; gap: 12px; padding: 12px; border: 2px outset #f1f1f1; background: #cfcfcf; }
    .brand { display: flex; flex-direction: column; justify-content: center; min-width: 0; }
    h1 { margin: 0 0 10px; font: 700 40px/0.96 "Times New Roman", Times, serif; color: #000; }
    .copy { margin: 0 0 12px; font: 700 17px/1.22 Arial, Helvetica, sans-serif; color: #111; }
    .link { color: #00e; text-decoration: underline; font: 16px "Times New Roman", Times, serif; }
    .badge { display: inline-block; width: fit-content; margin-top: 12px; padding: 5px 7px; border: 2px outset #fff; background: #ffffcc; font: 700 11px Arial, Helvetica, sans-serif; }
    .popup { padding: 8px; border: 2px outset #f1f1f1; background: #cfcfcf; overflow: hidden; }
    .head { margin-bottom: 7px; padding: 7px; border: 2px inset #f1f1f1; background: #eee; }
    .head h2 { margin: 0 0 3px; font: 700 20px/1.05 "Times New Roman", Times, serif; }
    .head p { margin: 0; font-size: 10px; line-height: 1.22; }
    .mode { display: grid; grid-template-columns: auto 1fr; gap: 6px; align-items: center; margin-bottom: 7px; padding: 5px; border: 2px inset #f1f1f1; background: #eee; font-size: 10px; font-weight: 700; }
    .select { height: 23px; padding: 4px; border: 2px inset #fff; background: #fff; font-weight: 400; }
    .buttons { display: grid; gap: 5px; }
    .button { height: 27px; display: flex; align-items: center; justify-content: center; border: 2px outset #fff; background: #e2e2e2; font-size: 11px; font-weight: 700; }
  </style>
</head>
<body>
  <main class="tile">
    <section class="brand">
      <h1>Retrofy<br>Page</h1>
      <p class="copy">Make any tab look like it time-traveled from the late 1990s.</p>
      <span class="link">No tracking. No backend.</span>
      <span class="badge">Best viewed in 800x600</span>
    </section>
    <section class="popup">
      <div class="head"><h2>Retrofy Page</h2><p>Make this tab look like it time-traveled from the late 1990s.</p></div>
      <div class="mode"><span>Mode</span><span class="select">Soft 90s</span></div>
      <div class="buttons">
        <span class="button">Retrofy this page</span>
        <span class="button">Open Retro Browser</span>
        <span class="button">Windows 95 Desktop</span>
        <span class="button">Real 90s</span>
      </div>
    </section>
  </main>
</body>
</html>
