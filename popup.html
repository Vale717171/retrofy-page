<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Retrofy Page</title>
    <link rel="stylesheet" href="popup.css">
  </head>
  <body>
    <main class="popup-shell">
      <header class="popup-header">
        <h1>Retrofy Page</h1>
        <p>Make this tab look like it time-traveled from the late 1990s.</p>
      </header>

      <section class="mode-picker" aria-label="Retro mode">
        <label for="modeSelect">Mode</label>
        <select id="modeSelect">
          <option value="soft">Soft 90s</option>
          <option value="chaos">GeoCities Chaos</option>
          <option value="pure-html">Pure HTML</option>
        </select>
      </section>

      <section class="actions" aria-label="Retrofy actions">
        <button id="retrofyButton" type="button">Retrofy this page</button>
        <button id="retroBrowserButton" type="button">Open Retro Browser</button>
        <button id="desktopButton" type="button">Windows 95 Desktop</button>
        <button id="exportButton" type="button">Export as .htm</button>
        <button id="real90sButton" type="button">Real 90s</button>
        <button id="removeButton" type="button">Remove retro mode</button>
      </section>

      <p id="status" class="status" role="status" aria-live="polite"></p>

      <footer>
        <a href="https://buymeacoffee.com/Vale71" target="_blank" rel="noopener noreferrer">
          Support the project
        </a>
      </footer>
    </main>

    <script src="popup.js"></script>
  </body>
</html>
