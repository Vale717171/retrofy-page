<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Retrofy Page</title>
    <link rel="stylesheet" href="popup.css">
  </head>
  <body>
    <main class="popup-shell">
      <header class="popup-header">
        <h1>Retrofy Page</h1>
        <p>Make this tab look like it time-traveled from the late 1990s.</p>
      </header>

      <section class="actions" aria-label="Retrofy actions">
        <button id="retrofyButton" type="button">Retrofy this page</button>
        <button id="removeButton" type="button">Remove retro mode</button>
        <button type="button" disabled title="Coming soon">Retro Browser – coming soon</button>
      </section>

      <p id="status" class="status" role="status" aria-live="polite"></p>

      <footer>
        <a href="https://buymeacoffee.com/Vale71" target="_blank" rel="noopener noreferrer">
          Support the project
        </a>
      </footer>
    </main>

    <script src="popup.js"></script>
  </body>
</html>
